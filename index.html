<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدليل الكامل لدول ومدن العالم عبر GeoNames</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3450;
            --accent: #4f8ef7;
            --accent2: #7c5cfc;
            --text: #e8eaf6;
            --text-muted: #8892b0;
            --success: #2dd4bf;
            --tag-bg: #1e2a45;
            --tag-text: #7eb3ff;
            --radius: 14px;
            --radius-sm: 8px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding: 30px 20px 60px;
        }

        /* خلفية ديناميكية */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(79,142,247,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 80% 80%, rgba(124,92,252,0.07) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            max-width: 1060px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* الرأس */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header h2 {
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 900;
            background: linear-gradient(135deg, #4f8ef7, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* شريط البحث */
        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-wrapper svg {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .search-box {
            width: 100%;
            padding: 15px 50px 15px 20px;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 40px;
            color: var(--text);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .search-box::placeholder { color: var(--text-muted); }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(79,142,247,0.12);
        }

        .search-box:focus ~ svg { color: var(--accent); }

        /* شريط الحالة */
        #status-message {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 22px;
            transition: all 0.4s ease;
            background: rgba(79,142,247,0.1);
            border: 1px solid rgba(79,142,247,0.2);
            color: #7eb3ff;
        }

        #status-message.success {
            background: rgba(45,212,191,0.1);
            border-color: rgba(45,212,191,0.2);
            color: var(--success);
        }

        #status-message.error {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.2);
            color: #f87171;
        }

        /* رسالة "لا نتائج" */
        #no-results {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* حاوية البطاقات */
        #data-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
            gap: 18px;
        }

        @media (max-width: 560px) {
            #data-container { grid-template-columns: 1fr; }
        }

        /* بطاقة الدولة */
        .country-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
            animation: cardIn 0.35s ease both;
        }

        .country-card:hover {
            border-color: rgba(79,142,247,0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .country-card.hidden { display: none; }

        .country-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .country-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .country-code {
            font-size: 11px;
            font-weight: 600;
            background: var(--surface2);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--border);
            letter-spacing: 1px;
        }

        .city-count {
            font-size: 12px;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(79,142,247,0.15), rgba(124,92,252,0.15));
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(79,142,247,0.2);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* قائمة المدن */
        .cities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
            padding-left: 3px;
        }

        .cities-list::-webkit-scrollbar { width: 4px; }
        .cities-list::-webkit-scrollbar-track { background: transparent; }
        .cities-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .city-item {
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(79,142,247,0.15);
            transition: background 0.15s, border-color 0.15s;
        }

        .city-item:hover {
            background: rgba(79,142,247,0.15);
            border-color: rgba(79,142,247,0.3);
        }

        .city-item.highlight {
            background: rgba(124,92,252,0.2);
            border-color: rgba(124,92,252,0.4);
            color: #c4b5fd;
        }

        .no-cities {
            color: var(--text-muted);
            font-size: 12px;
            font-style: italic;
            padding: 4px;
        }

        /* بروغريس بار */
        .progress-bar-wrap {
            width: 100%;
            height: 4px;
            background: var(--surface2);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
            display: none;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 4px;
            transition: width 0.4s ease;
            width: 0%;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="header">
        <h2>🌍 الدليل الشامل لدول ومدن العالم</h2>
        <p>بيانات حية مباشرة عبر GeoNames — تحميل متوازٍ بدفعات 30 دولة</p>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchBar" class="search-box"
               placeholder="جاري التحميل... يُرجى الانتظار" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>

    <div id="status-message">⏳ جاري الاتصال بـ GeoNames وجلب قائمة دول العالم...</div>
    <div id="no-results">🔍 لا توجد نتائج مطابقة لبحثك</div>

    <div id="data-container"></div>
</div>

<script>
    const USERNAME = 'myeo';

    // حالة التطبيق
    const state = {
        allCards: [],        // مرجع لكل عناصر DOM للبطاقات
        allData: [],         // بيانات الدول المحملة
        totalCountries: 0,
        loadedCount: 0,
        isLoading: true
    };

    const dataContainer  = document.getElementById('data-container');
    const statusMessage  = document.getElementById('status-message');
    const searchBar      = document.getElementById('searchBar');
    const noResults      = document.getElementById('no-results');
    const progressWrap   = document.getElementById('progressWrap');
    const progressFill   = document.getElementById('progressFill');

    const delay = ms => new Promise(r => setTimeout(r, ms));

    // ──────────────────────────────────────────────
    // 1. التحميل الرئيسي: دفعات 30 دولة متوازية
    // ──────────────────────────────────────────────
    async function loadGeoNamesDatabase() {
        try {
            const res  = await fetch(`https://secure.geonames.org/countryInfoJSON?username=${USERNAME}`);
            const data = await res.json();

            if (!data.geonames) throw new Error('فشل جلب الدول');

            const countries = data.geonames.sort((a, b) =>
                a.countryName.localeCompare(b.countryName));

            state.totalCountries = countries.length;
            progressWrap.style.display = 'block';

            // فتح شريط البحث فوراً
            searchBar.disabled = false;
            searchBar.placeholder = 'اكتب للبحث... (جاري تحميل المدن في الخلفية)';

            // تقسيم الدول إلى دفعات 30
            const BATCH_SIZE = 30;
            for (let i = 0; i < countries.length; i += BATCH_SIZE) {
                const batch = countries.slice(i, i + BATCH_SIZE);

                // جلب جميع دول الدفعة معاً بشكل متوازٍ
                const results = await Promise.allSettled(
                    batch.map(c => fetchCountryCities(c))
                );

                // معالجة نتائج الدفعة وإضافة البطاقات دفعة واحدة
                const fragment = document.createDocumentFragment();
                results.forEach(result => {
                    const obj = result.status === 'fulfilled'
                        ? result.value
                        : result.reason?._countryObj ?? { name: '?', code: '?', cities: [] };

                    state.allData.push(obj);
                    const card = buildCard(obj);
                    state.allCards.push({ el: card, data: obj });
                    fragment.appendChild(card);
                });
                dataContainer.appendChild(fragment);

                // تحديث شريط التقدم
                state.loadedCount = Math.min(i + BATCH_SIZE, countries.length);
                const pct = Math.round((state.loadedCount / state.totalCountries) * 100);
                progressFill.style.width = pct + '%';
                updateStatus(`⚡ تم تحميل ${state.loadedCount} / ${state.totalCountries} دولة...`);

                // فاصل بسيط بين الدفعات لتفادي حد الطلبات
                if (i + BATCH_SIZE < countries.length) await delay(500);
            }

            // اكتمل التحميل
            state.isLoading = false;
            progressFill.style.width = '100%';
            setTimeout(() => { progressWrap.style.display = 'none'; }, 800);

            statusMessage.className = 'success';
            updateStatus(`🎉 اكتمل تحميل ${state.totalCountries} دولة بنجاح!`);
            searchBar.placeholder = 'ابحث عن دولة أو مدينة...';

        } catch (err) {
            console.error(err);
            statusMessage.className = 'error';
            updateStatus('❌ خطأ: تأكد من تفعيل حساب GeoNames (myeo) للخدمات المجانية.');
        }
    }

    // ──────────────────────────────────────────────
    // 2. جلب المدن لدولة واحدة (مدن فقط: PPL, PPLA, PPLA2)
    //    featureClass=P + featureCode محدد لاستثناء الأرياف والمناطق الصغيرة
    // ──────────────────────────────────────────────
    async function fetchCountryCities(country) {
        const url = [
            'https://secure.geonames.org/searchJSON?',
            `country=${country.countryCode}`,
            '&featureClass=P',
            '&featureCode=PPL',    // مدن/بلدات مأهولة
            '&featureCode=PPLA',   // مراكز إدارية من الدرجة الأولى
            '&featureCode=PPLA2',  // مراكز إدارية من الدرجة الثانية
            '&featureCode=PPLC',   // العواصم
            '&orderby=population',
            '&maxRows=500',
            `&username=${USERNAME}`
        ].join('');

        try {
            const res  = await fetch(url);
            const data = await res.json();
            const cities = data.geonames
                ? [...new Set(data.geonames.map(c => c.name))].sort((a, b) => a.localeCompare(b))
                : [];

            return { name: country.countryName, code: country.countryCode, cities };
        } catch (err) {
            const e = new Error(err.message);
            e._countryObj = { name: country.countryName, code: country.countryCode, cities: [] };
            throw e;
        }
    }

    // ──────────────────────────────────────────────
    // 3. بناء بطاقة دولة
    // ──────────────────────────────────────────────
    function buildCard(item) {
        const card = document.createElement('div');
        card.className = 'country-card';
        card.dataset.countryName  = item.name.toLowerCase();
        card.dataset.countryCities = item.cities.join('|').toLowerCase();

        card.innerHTML = `
          <div class="country-header">
            <div class="country-title">
              ${item.name}
              <span class="country-code">${item.code}</span>
            </div>
            <span class="city-count">${item.cities.length} مدينة</span>
          </div>
          <div class="cities-list">
            ${item.cities.length
              ? item.cities.map(c => `<span class="city-item" data-city="${c.toLowerCase()}">${c}</span>`).join('')
              : '<span class="no-cities">لا توجد مدن متاحة</span>'
            }
          </div>
        `;
        return card;
    }

    // ──────────────────────────────────────────────
    // 4. البحث — إخفاء/إظهار البطاقات بدلاً من حذفها وإعادة بنائها
    // ──────────────────────────────────────────────
    function applySearch(term) {
        if (!term) {
            // أظهر الكل وأزل أي تمييز
            let visible = 0;
            state.allCards.forEach(({ el }) => {
                el.classList.remove('hidden');
                // إزالة تمييز المدن
                el.querySelectorAll('.city-item.highlight')
                  .forEach(c => c.classList.remove('highlight'));
                visible++;
            });
            noResults.style.display = 'none';
            return;
        }

        let visible = 0;
        state.allCards.forEach(({ el, data }) => {
            const matchCountry = data.name.toLowerCase().includes(term);
            const citiesEl     = el.querySelectorAll('.city-item');

            let matchedAnCity = false;
            citiesEl.forEach(cityEl => {
                const cityName = cityEl.dataset.city || cityEl.textContent.toLowerCase();
                if (cityName.includes(term)) {
                    cityEl.classList.add('highlight');
                    matchedAnCity = true;
                } else {
                    cityEl.classList.remove('highlight');
                }
            });

            if (matchCountry || matchedAnCity) {
                el.classList.remove('hidden');
                visible++;
            } else {
                el.classList.add('hidden');
            }
        });

        noResults.style.display = visible === 0 ? 'block' : 'none';
    }

    // ──────────────────────────────────────────────
    // 5. مستمعو أحداث البحث
    // ──────────────────────────────────────────────
    let searchDebounce = null;
    searchBar.addEventListener('input', function () {
        clearTimeout(searchDebounce);
        const val = this.value.trim().toLowerCase();
        searchDebounce = setTimeout(() => applySearch(val), 200);
    });

    // ──────────────────────────────────────────────
    // مساعد تحديث الحالة
    // ──────────────────────────────────────────────
    function updateStatus(msg) {
        statusMessage.textContent = msg;
    }

    // ──────────────────────────────────────────────
    // بدء التحميل عند تحميل الصفحة
    // ──────────────────────────────────────────────
    window.addEventListener('load', loadGeoNamesDatabase);
</script>

</body>
</html>
