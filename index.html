<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الدول والمدن - GeoNames</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    background: #f4f4f4;
    padding: 20px;
}

button {
    padding: 10px 15px;
    margin: 10px 0;
    cursor: pointer;
}

select {
    width: 300px;
    padding: 8px;
    margin: 10px 0;
}

.box {
    background: white;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>🌍 الدول والمدن عبر GeoNames (بدون API)</h2>

<button onclick="loadData()">تحميل البيانات</button>

<div class="box">
    <label>الدول:</label><br>
    <select id="countries" onchange="loadCities()"></select>

    <br><br>

    <label>المدن:</label><br>
    <select id="cities"></select>
</div>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let countryMap = {};   // code => name
let cityMap = {};      // countryCode => cities array

// تحميل الدول + المدن
async function loadData() {

    // 1. تحميل الدول
    const countriesRes = await fetch("https://download.geonames.org/export/dump/countryInfo.txt");
    const countriesText = await countriesRes.text();

    countriesText.split("\n").forEach(line => {
        if (line.startsWith("#") || !line.trim()) return;

        const parts = line.split("\t");
        const code = parts[0];
        const name = parts[4];

        countryMap[code] = name;
    });

    const countriesSelect = document.getElementById("countries");
    countriesSelect.innerHTML = "";

    Object.entries(countryMap).forEach(([code, name]) => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = name;
        countriesSelect.appendChild(opt);
    });

    // 2. تحميل المدن (ZIP)
    const zipRes = await fetch("https://download.geonames.org/export/dump/cities15000.zip");
    const zipData = await zipRes.arrayBuffer();

    const zip = await JSZip.loadAsync(zipData);
    const fileName = Object.keys(zip.files)[0];
    const text = await zip.files[fileName].async("string");

    text.split("\n").forEach(line => {
        if (!line.trim()) return;

        const parts = line.split("\t");

        const city = parts[1];
        const countryCode = parts[8];

        if (!cityMap[countryCode]) {
            cityMap[countryCode] = [];
        }

        cityMap[countryCode].push(city);
    });

    alert("تم تحميل الدول والمدن بنجاح ✅");
}

// عند اختيار دولة
function loadCities() {
    const code = document.getElementById("countries").value;
    const citiesSelect = document.getElementById("cities");

    citiesSelect.innerHTML = "";

    (cityMap[code] || []).forEach(city => {
        const opt = document.createElement("option");
        opt.textContent = city;
        citiesSelect.appendChild(opt);
    });
}
</script>

</body>
</html>
