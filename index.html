<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الدول والمدن - GeoNames</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    background: #f5f5f5;
    padding: 20px;
}

.country {
    background: #fff;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

.city {
    margin-right: 20px;
    color: #444;
    font-size: 14px;
}

.error {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>🌍 الدول والمدن في العالم</h2>
<div id="output">جاري التحميل...</div>

<script>

let username = "myeo";

// لو فشل حسابك استخدم demo تلقائيًا
const fallbackUser = "demo";

// تأخير بسيط لتجنب قطع الاتصال
function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// جلب الدول
async function getCountries() {
    try {
        let res = await fetch(`https://api.geonames.org/countryInfoJSON?username=${username}`);
        
        if (!res.ok) throw new Error("Primary failed");

        let data = await res.json();

        if (!data.geonames) throw new Error("No data");

        return data.geonames;

    } catch (err) {
        console.warn("Switching to demo account...");

        let res = await fetch(`https://api.geonames.org/countryInfoJSON?username=${fallbackUser}`);
        let data = await res.json();

        return data.geonames || [];
    }
}

// جلب مدن الدولة
async function getCities(countryCode) {
    try {
        let res = await fetch(`https://api.geonames.org/searchJSON?country=${countryCode}&featureClass=P&maxRows=10&username=${username}`);

        if (!res.ok) throw new Error("City fetch failed");

        let data = await res.json();

        return data.geonames || [];

    } catch (err) {
        return [];
    }
}

// تشغيل
async function load() {
    const output = document.getElementById("output");
    output.innerHTML = "";

    const countries = await getCountries();

    if (!countries.length) {
        output.innerHTML = "<div class='error'>❌ فشل تحميل البيانات من GeoNames</div>";
        return;
    }

    for (const country of countries) {

        const countryDiv = document.createElement("div");
        countryDiv.className = "country";
        countryDiv.innerHTML = `<h3>🌎 ${country.countryName}</h3><div>⏳ جاري تحميل المدن...</div>`;
        output.appendChild(countryDiv);

        const cities = await getCities(country.countryCode);

        let html = "";
        cities.forEach(city => {
            html += `<div class="city">🏙️ ${city.name}</div>`;
        });

        countryDiv.innerHTML = `
            <h3>🌎 ${country.countryName}</h3>
            ${html || "<div class='error'>لا توجد مدن</div>"}
        `;

        // مهم جدًا لتخفيف الضغط على API
        await delay(200);
    }
}

load();

</script>

</body>
</html>
