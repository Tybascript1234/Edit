<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدليل الكامل لدول ومدن العالم عبر GeoNames</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        /* شريط البحث */
        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 30px;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .search-box:focus {
            border-color: #3498db;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15);
        }
        /* مؤشر التحميل والتحديث الحي */
        #status-message {
            text-align: center;
            font-size: 16px;
            color: #2980b9;
            background: #eaf2f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        /* حاوية البيانات الكاملة */
        #data-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        /* بطاقة الدولة */
        .country-card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.4s ease-in-out;
        }
        /* حالة الإخفاء عبر CSS فقط دون إزالة من DOM */
        .country-card.hidden {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .country-name {
            font-size: 22px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .city-count {
            font-size: 13px;
            background: #3498db;
            color: #fff;
            padding: 3px 10px;
            border-radius: 15px;
        }
        /* حاوية المدن المفرودة */
        .cities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .city-item {
            background-color: #f8fafc;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        /* إخفاء مدينة معينة عند البحث */
        .city-item.hidden {
            display: none;
        }
        .cities-list::-webkit-scrollbar {
            width: 4px;
        }
        .cities-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        /* رسالة لا توجد نتائج */
        #no-results {
            display: none;
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>الدليل الشامل لدول ومدن العالم (GeoNames)</h2>
    <p class="subtitle">بيانات حية ومباشرة مدعومة بحسابك الشخصي عبر سيرفر GeoNames</p>
    
    <input type="text" id="searchBar" class="search-box" placeholder="البحث معطل مؤقتاً حتى يكتمل تحميل بعض الدول..." disabled>

    <div id="status-message">جاري الاتصال بخادم GeoNames وجلب قائمة دول العالم...</div>

    <p id="no-results">لم يتم العثور على نتائج مطابقة.</p>

    <div id="data-container"></div>
</div>

<script>
    // اسم المستخدم الخاص بك على GeoNames
    const username = 'myeo'; 
    
    let structuredWorldData = []; 

    const dataContainer = document.getElementById('data-container');
    const statusMessage = document.getElementById('status-message');
    const searchBar = document.getElementById('searchBar');
    const noResults = document.getElementById('no-results');

    // دالة مساعدة لعمل تأخير زمني مخصص (بالملي ثانية)
    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

    // 1. الدالة الأساسية لجلب الدول وبدء التحميل التتابعي للمدن على مجموعات (30 دولة لكل دفعة)
    async function loadGeoNamesDatabase() {
        try {
            // جلب قائمة كافة الدول من GeoNames
            const countriesUrl = `https://secure.geonames.org/countryInfoJSON?username=${username}`;
            const response = await fetch(countriesUrl);
            const data = await response.json();
            
            if (!data.geonames) {
                throw new Error('فشل جلب الدول، تأكد من تفعيل حساب GeoNames الخاص بك للخدمات الحرة (Free Web Services)');
            }

            const countries = data.geonames;
            // ترتيب الدول أبجدياً طبقاً لاسمها قبل المعالجة
            countries.sort((a, b) => a.countryName.localeCompare(b.countryName));

            // فتح ميزة البحث فوراً على الدول المتاحة حتى لا ينتظر المستخدم طويلاً
            searchBar.disabled = false;
            searchBar.placeholder = "اكتب كلمة البحث للفلترة الفورية...";

            let count = 0;
            let currentChunk = [];

            // حلقة تكرارية تقوم بتحميل مدن الدول بالتتابع
            for (const country of countries) {
                count++;
                statusMessage.textContent = `جاري جلب مدن: ${country.countryName} (${count} من أصل ${countries.length})...`;

                try {
                    // جلب مدن هذه الدولة تحديداً
                    const citiesUrl = `https://secure.geonames.org/searchJSON?country=${country.countryCode}&featureClass=P&maxRows=1000&username=${username}`;
                    const citiesResponse = await fetch(citiesUrl);
                    const citiesData = await citiesResponse.json();
                    
                    let citiesList = [];
                    if (citiesData.geonames) {
                        // استخراج الأسماء الفريدة ومنع التكرار
                        citiesList = [...new Set(citiesData.geonames.map(c => c.name))];
                    }

                    // تجهيز كائن البيانات الخاص بالدولة الحالية
                    const countryObj = {
                        name: country.countryName,
                        native: country.countryName, 
                        code: country.countryCode,
                        cities: citiesList
                    };

                    // إضافتها إلى مصفوفة البيانات الكلية المخصصة للبحث
                    structuredWorldData.push(countryObj);
                    
                    // إضافتها إلى الدفعة الحالية ليتم حقنها في الصفحة
                    currentChunk.push(countryObj);

                    // عندما تصل الدفعة الحالية إلى 30 دولة أو نصل إلى نهاية المصفوفة
                    if (currentChunk.length === 30 || count === countries.length) {
                        // حقن الـ 30 دولة دفعة واحدة في الصفحة
                        currentChunk.forEach(item => appendCountryCard(item));
                        // تصفير المصفوفة المؤقتة لاستقبال الدفعة التالية
                        currentChunk = [];
                        // الفاصل الزمني المطلوب بين كل دفعة (30 دولة) والدفعة التالية
                        await delay(1);
                    }

                } catch (err) {
                    console.error(`خطأ في جلب مدن ${country.countryName}:`, err);
                    
                    // في حال الفشل، نضمن بناء كائن فارغ للمدن حتى لا يحدث خلل بالعد
                    const failedCountryObj = { name: country.countryName, native: country.countryName, code: country.countryCode, cities: [] };
                    structuredWorldData.push(failedCountryObj);
                    currentChunk.push(failedCountryObj);
                    if (currentChunk.length === 30 || count === countries.length) {
                        currentChunk.forEach(item => appendCountryCard(item));
                        currentChunk = [];
                        await delay(1);
                    }
                }
            }

            // عند اكتمال تحميل كافة دول ومدن العالم بالكامل
            statusMessage.style.background = '#d4edda';
            statusMessage.style.color = '#155724';
            statusMessage.textContent = '🎉 اكتمل تحميل كافة دول ومدن العالم بنجاح!';
            searchBar.placeholder = "اكتب للبحث الفوري في الدول والمدن...";

        } catch (error) {
            console.error('خطأ أثناء تحميل البيانات:', error);
            statusMessage.textContent = 'حدث خطأ. يرجى التأكد من أن حساب GeoNames (myeo) مفعّل لخدمات الويب الحرة في إعدادات موقع GeoNames.';
            statusMessage.style.background = '#f2dede';
            statusMessage.style.color = '#a94442';
        }
    }

    // دالة لحقن بطاقة الدولة مباشرة في واجهة المستخدم أثناء جلب البيانات
    function appendCountryCard(item) {
        const card = document.createElement('div');
        card.className = 'country-card';
        // نخزن الاسم مصغراً كـ data attribute للمقارنة السريعة لاحقاً
        card.setAttribute('data-country-name', item.name.toLowerCase());
        card.setAttribute('data-country-code', item.code.toLowerCase());

        const countryHeader = document.createElement('h3');
        countryHeader.className = 'country-name';
        countryHeader.innerHTML = `
            <span>${item.name} <small style="color:#7f8c8d; font-size:14px;">(${item.code})</small></span>
            <span class="city-count">${item.cities.length} مدينة/بلدة</span>
        `;
        card.appendChild(countryHeader);

        const citiesDiv = document.createElement('div');
        citiesDiv.className = 'cities-list';

        if(item.cities.length > 0) {
            item.cities.sort((a, b) => a.localeCompare(b));
            item.cities.forEach(city => {
                const citySpan = document.createElement('span');
                citySpan.className = 'city-item';
                // نخزن اسم المدينة مصغراً كـ data attribute للمقارنة السريعة
                citySpan.setAttribute('data-city-name', city.toLowerCase());
                citySpan.textContent = city;
                citiesDiv.appendChild(citySpan);
            });
        } else {
            citiesDiv.innerHTML = '<em style="color:#aaa; font-size:13px; padding: 5px;">لا توجد مدن متوفرة</em>';
        }

        card.appendChild(citiesDiv);
        dataContainer.appendChild(card);
    }

    // =====================================================================
    // 2. دالة العرض التتابعي عند أول تحميل (30 دولة ثم 1ms وهكذا)
    //    تُستخدم فقط في renderDataChunked للبيانات التي لم تُبنَ بعد في DOM
    // =====================================================================
    async function renderDataChunked(data) {
        dataContainer.innerHTML = '';
        noResults.style.display = 'none';

        if(data.length === 0) {
            noResults.style.display = 'block';
            return;
        }

        let index = 0;
        while (index < data.length) {
            const chunk = data.slice(index, index + 30); // ← 30 دولة لكل دفعة
            chunk.forEach(item => appendCountryCard(item));
            index += 30;
            await delay(1);
        }
    }

    // =====================================================================
    // 3. دالة الفلترة عبر إخفاء/إظهار البطاقات الموجودة في DOM فقط
    //    بدون حذف أو إعادة بناء أي عنصر — فورية وخفيفة جداً
    // =====================================================================
    function filterCardsInDOM(searchTerm) {
        const cards = dataContainer.querySelectorAll('.country-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const countryName = card.getAttribute('data-country-name') || '';
            const matchCountry = countryName.includes(searchTerm);

            // التعامل مع مدن البطاقة
            const cityItems = card.querySelectorAll('.city-item');
            let matchedCitiesCount = 0;

            cityItems.forEach(cityItem => {
                const cityName = cityItem.getAttribute('data-city-name') || '';
                if (matchCountry) {
                    // إذا تطابقت الدولة، نُظهر كل مدنها
                    cityItem.classList.remove('hidden');
                    matchedCitiesCount++;
                } else if (cityName.includes(searchTerm)) {
                    cityItem.classList.remove('hidden');
                    matchedCitiesCount++;
                } else {
                    cityItem.classList.add('hidden');
                }
            });

            // إظهار البطاقة إذا تطابقت الدولة أو أي مدينة منها
            if (matchCountry || matchedCitiesCount > 0) {
                card.classList.remove('hidden');
                visibleCount++;
            } else {
                card.classList.add('hidden');
            }
        });

        // إظهار رسالة "لا توجد نتائج" إذا لزم
        noResults.style.display = visibleCount === 0 ? 'block' : 'none';
    }

    // دالة إظهار كل البطاقات والمدن بدون أي حذف أو إعادة بناء
    function showAllCardsInDOM() {
        const cards = dataContainer.querySelectorAll('.country-card');
        cards.forEach(card => {
            card.classList.remove('hidden');
            card.querySelectorAll('.city-item').forEach(cityItem => {
                cityItem.classList.remove('hidden');
            });
        });
        noResults.style.display = 'none';
    }

    // =====================================================================
    // 4. مراقبة حركة البحث — فلترة فورية عند كل حرف (input event)
    // =====================================================================
    searchBar.addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase().trim();

        if (searchTerm === '') {
            // عند تفريغ خانة البحث: إظهار كل البطاقات فقط بدون أي إعادة بناء
            showAllCardsInDOM();
        } else {
            // فلترة فورية عبر إخفاء/إظهار العناصر الموجودة في DOM
            filterCardsInDOM(searchTerm);
        }
    });

    // دعم Enter للبحث أيضاً (سلوك اختياري للمستخدمين الذين يضغطون Enter)
    searchBar.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const searchTerm = searchBar.value.toLowerCase().trim();
            if (searchTerm === '') {
                showAllCardsInDOM();
            } else {
                filterCardsInDOM(searchTerm);
            }
        }
    });

    window.onload = loadGeoNamesDatabase;
</script>

</body>
</html>
