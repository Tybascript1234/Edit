<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدليل الكامل لدول ومدن العالم عبر GeoNames</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 30px;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .search-box:focus {
            border-color: #3498db;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15);
        }
        #status-message {
            text-align: center;
            font-size: 16px;
            color: #2980b9;
            background: #eaf2f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        #no-results {
            display: none;
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 15px;
        }
        #data-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        .country-card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.4s ease-in-out;
        }
        .country-card.hidden {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .country-name {
            font-size: 22px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .city-count {
            font-size: 13px;
            background: #3498db;
            color: #fff;
            padding: 3px 10px;
            border-radius: 15px;
            white-space: nowrap;
        }
        .city-count-filtered {
            font-size: 13px;
            background: #e67e22;
            color: #fff;
            padding: 3px 10px;
            border-radius: 15px;
            white-space: nowrap;
            display: none;
        }
        .cities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .city-item {
            background-color: #f8fafc;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .city-item.city-hidden {
            display: none;
        }
        .city-item.city-match {
            background-color: #fff3cd;
            border-color: #ffc107;
            color: #333;
            font-weight: bold;
        }
        .cities-list::-webkit-scrollbar {
            width: 4px;
        }
        .cities-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>الدليل الشامل لدول ومدن العالم (GeoNames)</h2>
    <p class="subtitle">بيانات حية ومباشرة مدعومة بحسابك الشخصي عبر سيرفر GeoNames</p>
    
    <input type="text" id="searchBar" class="search-box" placeholder="البحث معطل مؤقتاً حتى يكتمل تحميل بعض الدول..." disabled>

    <div id="status-message">جاري الاتصال بخادم GeoNames وجلب قائمة دول العالم...</div>
    <div id="no-results">لم يتم العثور على نتائج مطابقة.</div>

    <div id="data-container"></div>
</div>

<script>
    const username = 'myeo';
    
    // مصفوفة لتخزين مراجع بطاقات DOM لكل دولة للتحكم بها لاحقاً
    let countryCards = [];

    const dataContainer = document.getElementById('data-container');
    const statusMessage = document.getElementById('status-message');
    const searchBar = document.getElementById('searchBar');
    const noResults = document.getElementById('no-results');

    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

    // =========================================================
    // 1. التحميل الأولي: جلب 30 دولة وبيانات مدنها بالتوازي
    // =========================================================
    async function loadGeoNamesDatabase() {
        try {
            const countriesUrl = `https://secure.geonames.org/countryInfoJSON?username=${username}`;
            const response = await fetch(countriesUrl);
            const data = await response.json();
            
            if (!data.geonames) {
                throw new Error('فشل جلب الدول، تأكد من تفعيل حساب GeoNames الخاص بك للخدمات الحرة');
            }

            const countries = data.geonames;
            countries.sort((a, b) => a.countryName.localeCompare(b.countryName));

            searchBar.disabled = false;
            searchBar.placeholder = "اكتب للبحث الفوري في الدول والمدن...";

            const BATCH_SIZE = 30;
            let count = 0;

            for (let i = 0; i < countries.length; i += BATCH_SIZE) {
                const batch = countries.slice(i, i + BATCH_SIZE);
                const batchEnd = Math.min(i + BATCH_SIZE, countries.length);

                statusMessage.textContent = `جاري جلب مدن الدول من ${i + 1} إلى ${batchEnd} من أصل ${countries.length}...`;

                // جلب مدن جميع دول الدفعة بالتوازي (Promise.all)
                const batchPromises = batch.map(async (country) => {
                    try {
                        const citiesUrl = `https://secure.geonames.org/searchJSON?country=${country.countryCode}&featureClass=P&maxRows=1000&username=${username}`;
                        const citiesResponse = await fetch(citiesUrl);
                        const citiesData = await citiesResponse.json();
                        
                        let citiesList = [];
                        if (citiesData.geonames) {
                            citiesList = [...new Set(citiesData.geonames.map(c => c.name))];
                        }
                        return {
                            name: country.countryName,
                            code: country.countryCode,
                            cities: citiesList
                        };
                    } catch (err) {
                        console.error(`خطأ في جلب مدن ${country.countryName}:`, err);
                        return {
                            name: country.countryName,
                            code: country.countryCode,
                            cities: []
                        };
                    }
                });

                // انتظار اكتمال الدفعة كاملة ثم حقنها دفعة واحدة
                const batchResults = await Promise.all(batchPromises);
                batchResults.forEach(item => appendCountryCard(item));
                count += batchResults.length;

                // فاصل زمني قصير بين الدفعات لتفادي تجميد الواجهة
                if (i + BATCH_SIZE < countries.length) {
                    await delay(1);
                }
            }

            statusMessage.style.background = '#d4edda';
            statusMessage.style.color = '#155724';
            statusMessage.textContent = `🎉 اكتمل تحميل ${count} دولة بكافة مدنها بنجاح!`;

        } catch (error) {
            console.error('خطأ أثناء تحميل البيانات:', error);
            statusMessage.textContent = 'حدث خطأ. يرجى التأكد من أن حساب GeoNames (myeo) مفعّل لخدمات الويب الحرة في إعدادات موقع GeoNames.';
            statusMessage.style.background = '#f2dede';
            statusMessage.style.color = '#a94442';
        }
    }

    // =========================================================
    // 2. إنشاء بطاقة الدولة وحفظ مرجع DOM الخاص بها
    // =========================================================
    function appendCountryCard(item) {
        const card = document.createElement('div');
        card.className = 'country-card';

        const sortedCities = [...item.cities].sort((a, b) => a.localeCompare(b));

        const countryHeader = document.createElement('h3');
        countryHeader.className = 'country-name';
        countryHeader.innerHTML = `
            <span>${item.name} <small style="color:#7f8c8d; font-size:14px;">(${item.code})</small></span>
            <span class="city-count">${sortedCities.length} مدينة/بلدة</span>
            <span class="city-count-filtered"></span>
        `;
        card.appendChild(countryHeader);

        const citiesDiv = document.createElement('div');
        citiesDiv.className = 'cities-list';

        if (sortedCities.length > 0) {
            sortedCities.forEach(city => {
                const citySpan = document.createElement('span');
                citySpan.className = 'city-item';
                citySpan.textContent = city;
                citiesDiv.appendChild(citySpan);
            });
        } else {
            citiesDiv.innerHTML = '<em style="color:#aaa; font-size:13px; padding: 5px;">لا توجد مدن متوفرة</em>';
        }

        card.appendChild(citiesDiv);
        dataContainer.appendChild(card);

        // حفظ مرجع البطاقة مع بياناتها للبحث الفوري
        countryCards.push({
            card,
            name: item.name.toLowerCase(),
            code: item.code.toLowerCase(),
            cityItems: citiesDiv.querySelectorAll('.city-item'),
            totalCount: sortedCities.length,
            countBadge: countryHeader.querySelector('.city-count'),
            filteredBadge: countryHeader.querySelector('.city-count-filtered')
        });

        // تطبيق البحث الحالي على البطاقة الجديدة مباشرة لو كان هناك بحث نشط
        if (searchBar.value.trim()) {
            applySearchToCard(countryCards[countryCards.length - 1], searchBar.value.toLowerCase().trim());
        }
    }

    // =========================================================
    // 3. تطبيق البحث على بطاقة واحدة
    // =========================================================
    function applySearchToCard(cardData, query) {
        const { card, name, code, cityItems, totalCount, countBadge, filteredBadge } = cardData;

        if (!query) {
            card.classList.remove('hidden');
            cityItems.forEach(ci => ci.classList.remove('city-hidden', 'city-match'));
            countBadge.style.display = '';
            filteredBadge.style.display = 'none';
            return;
        }

        const matchCountry = name.includes(query) || code.includes(query);
        let matchingCitiesCount = 0;

        cityItems.forEach(ci => {
            const cityName = ci.textContent.toLowerCase();
            const cityMatches = cityName.includes(query);
            if (matchCountry || cityMatches) {
                ci.classList.remove('city-hidden');
                if (!matchCountry && cityMatches) {
                    ci.classList.add('city-match');
                    matchingCitiesCount++;
                } else {
                    ci.classList.remove('city-match');
                    if (matchCountry) matchingCitiesCount++;
                }
            } else {
                ci.classList.add('city-hidden');
                ci.classList.remove('city-match');
            }
        });

        if (matchCountry || matchingCitiesCount > 0) {
            card.classList.remove('hidden');
            if (!matchCountry && matchingCitiesCount > 0 && matchingCitiesCount < totalCount) {
                countBadge.style.display = 'none';
                filteredBadge.style.display = '';
                filteredBadge.textContent = `${matchingCitiesCount} نتيجة`;
            } else {
                countBadge.style.display = '';
                filteredBadge.style.display = 'none';
            }
        } else {
            card.classList.add('hidden');
            countBadge.style.display = '';
            filteredBadge.style.display = 'none';
        }
    }

    // =========================================================
    // 4. البحث الفوري: إخفاء/إظهار البطاقات والمدن بدون إعادة تحميل
    // =========================================================
    function applySearch(term) {
        const query = term.toLowerCase().trim();
        let visibleCount = 0;

        countryCards.forEach(cardData => {
            applySearchToCard(cardData, query);
            if (!cardData.card.classList.contains('hidden')) {
                visibleCount++;
            }
        });

        noResults.style.display = (query && visibleCount === 0) ? 'block' : 'none';
    }

    // =========================================================
    // 5. الاستماع للبحث: فوري عند كل ضغطة مفتاح
    // =========================================================
    searchBar.addEventListener('input', function () {
        applySearch(this.value);
    });

    searchBar.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            applySearch(this.value);
        }
    });

    window.onload = loadGeoNamesDatabase;
</script>

</body>
</html>
