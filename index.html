<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدليل الكامل للمدن</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        .top-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; padding: 15px; border: 2px solid #cbd5e1; border-radius: 30px; outline: none; }
        .action-btn { padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; color: #fff; font-weight: bold; }
        #btn-download { background: #27ae60; }
        #btn-copy { background: #2980b9; }
        #status-message { text-align: center; padding: 15px; margin-bottom: 20px; background: #eaf2f8; border-radius: 8px; }
        #data-container { display: grid; gap: 20px; }
        .country-card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .country-name { font-size: 18px; color: #2c3e50; margin-bottom: 10px; border-bottom: 2px solid #3498db; }
        .cities-list { display: flex; flex-wrap: wrap; gap: 5px; max-height: 200px; overflow-y: auto; }
        .city-item { background-color: #f8fafc; padding: 5px 10px; border-radius: 6px; font-size: 12px; border: 1px solid #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="top-controls">
        <input type="text" id="searchBar" class="search-box" placeholder="ابحث عن دولة..." disabled>
        <button id="btn-download" class="action-btn" disabled>تنزيل</button>
        <button id="btn-copy" class="action-btn" disabled>نسخ الكل</button>
    </div>
    <div id="status-message">جاري الاتصال...</div>
    <div id="data-container"></div>
</div>

<script>
    const username = 'myeo';
    const RECOGNIZED_196 = new Set(['AF','AL','DZ','AD','AO','AG','AR','AM','AU','AT','AZ','BS','BH','BD','BB','BY','BE','BZ','BJ','BT','BO','BA','BW','BR','BN','BG','BF','BI','CV','KH','CM','CA','CF','TD','CL','CN','CO','KM','CG','CD','CR','CI','HR','CU','CY','CZ','DK','DJ','DM','DO','EC','EG','SV','GQ','ER','EE','SZ','ET','FJ','FI','FR','GA','GM','GE','DE','GH','GR','GD','GT','GN','GW','GY','HT','HN','HU','IS','IN','ID','IR','IQ','IE','IL','IT','JM','JP','JO','KZ','KE','KI','KP','KR','KW','KG','LA','LV','LB','LS','LR','LY','LI','LT','LU','MG','MW','MY','MV','ML','MT','MH','MR','MU','MX','FM','MD','MC','MN','ME','MA','MZ','MM','NA','NR','NP','NL','NZ','NI','NE','NG','NO','OM','PK','PW','PA','PG','PY','PE','PH','PL','PT','QA','RO','RU','RW','KN','LC','VC','WS','SM','ST','SA','SN','RS','SC','SL','SG','SK','SI','SB','SO','ZA','SS','ES','LK','SD','SR','SE','CH','SY','TW','TJ','TZ','TH','TL','TG','TO','TT','TN','TR','TM','TV','UG','UA','AE','GB','US','UY','UZ','VU','VE','VN','YE','ZM','ZW','VA','PS','XK']);

    const dataContainer = document.getElementById('data-container');
    const statusMessage = document.getElementById('status-message');
    const searchBar = document.getElementById('searchBar');
    const btnDownload = document.getElementById('btn-download');
    const btnCopy = document.getElementById('btn-copy');
    const allCards = [];

    function getData() {
        const result = {};
        dataContainer.querySelectorAll('.country-card:not(.hidden)').forEach(card => {
            const name = card.querySelector('.country-name').textContent.replace(/\(.*?\)/, '').trim();
            const cities = Array.from(card.querySelectorAll('.city-item')).map(el => el.textContent);
            result[name] = cities;
        });
        return JSON.stringify(result, null, 4);
    }

    async function init() {
        try {
            const res = await fetch(`https://secure.geonames.org/countryInfoJSON?username=${username}`);
            const data = await res.json();
            const countries = data.geonames.filter(c => RECOGNIZED_196.has(c.countryCode)).sort((a, b) => a.countryName.localeCompare(b.countryName));
            
            searchBar.disabled = false;
            for (const country of countries) {
                statusMessage.textContent = `جاري تحميل: ${country.countryName}`;
                const cRes = await fetch(`https://secure.geonames.org/searchJSON?country=${country.countryCode}&featureClass=P&maxRows=1000&lang=en&username=${username}`);
                const cData = await cRes.json();
                const cities = [...new Set(cData.geonames.map(c => c.name))].sort();
                
                const card = document.createElement('div');
                card.className = 'country-card';
                card.innerHTML = `<div class="country-name">${country.countryName}</div><div class="cities-list">${cities.map(c => `<span class="city-item">${c}</span>`).join('')}</div>`;
                dataContainer.appendChild(card);
                allCards.push({ card, name: country.countryName.toLowerCase() });
            }
            statusMessage.textContent = "تم التحميل بنجاح";
            btnDownload.disabled = false;
            btnCopy.disabled = false;
        } catch (e) { statusMessage.textContent = "خطأ في الاتصال"; }
    }

    btnDownload.addEventListener('click', () => {
        const blob = new Blob([getData()], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'data.json'; a.click();
    });

    btnCopy.addEventListener('click', () => navigator.clipboard.writeText(getData()));

    searchBar.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        allCards.forEach(c => c.card.classList.toggle('hidden', !c.name.includes(term)));
    });

    init();
</script>
</body>
</html>
