<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الدول والمدن - GeoNames</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    background: #f5f5f5;
    padding: 20px;
}

.country {
    background: #fff;
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

.city {
    margin-right: 20px;
    color: #444;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>🌍 الدول والمدن في العالم</h2>
<div id="output">جاري التحميل...</div>

<script>

const username = "myeo";

// جلب الدول
async function getCountries() {
    const res = await fetch(`https://api.geonames.org/countryInfoJSON?username=${username}`);
    const data = await res.json();
    return data.geonames;
}

// جلب مدن الدولة
async function getCities(countryCode) {
    const res = await fetch(`https://api.geonames.org/searchJSON?country=${countryCode}&featureClass=P&maxRows=20&username=${username}`);
    const data = await res.json();
    return data.geonames || [];
}

// تشغيل
async function load() {
    const output = document.getElementById("output");
    output.innerHTML = "";

    const countries = await getCountries();

    for (const country of countries) {

        const countryDiv = document.createElement("div");
        countryDiv.className = "country";
        countryDiv.innerHTML = `<h3>🌎 ${country.countryName}</h3><div>جاري تحميل المدن...</div>`;
        output.appendChild(countryDiv);

        const cities = await getCities(country.countryCode);

        let html = "";
        cities.forEach(city => {
            html += `<div class="city">🏙️ ${city.name}</div>`;
        });

        countryDiv.innerHTML = `<h3>🌎 ${country.countryName}</h3>${html}`;
    }
}

load();

</script>

</body>
</html>
