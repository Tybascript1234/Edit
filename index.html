<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة دول ومدن العالم</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #fff;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus {
            border-color: #007bff;
        }
        select:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
        .loading {
            font-size: 12px;
            color: #007bff;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>قائمة الدول والمدن الديناميكية</h2>

    <div class="form-group">
        <label for="country">اختر الدولة:</label>
        <select id="country">
            <option value="">-- جاري تحميل الدول... --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="state">اختر الولاية/المحافظة:</label>
        <select id="state" disabled>
            <option value="">-- اختر الدولة أولاً --</option>
        </select>
        <div id="state-loading" class="loading">جاري تحميل المحافظات...</div>
    </div>

    <div class="form-group">
        <label for="city">اختر المدينة:</label>
        <select id="city" disabled>
            <option value="">-- اختر المحافظة أولاً --</option>
        </select>
        <div id="city-loading" class="loading">جاري تحميل المدن...</div>
    </div>
</div>

<script>
    // استخدام API مفتوح ومجاني لبيانات الدول والمدن
    const config = {
        cUrl: 'https://api.countrystatecity.in/v1/countries',
        ckey: 'NHVvOWh6bExRowVpZ0N0N01JWkY0N2ZTeU5vN0g1b0g3b01mY3RLYw==' // مفتاح تجريبي مجاني موثق
    };

    const countrySelect = document.getElementById('country');
    const stateSelect = document.getElementById('state');
    const citySelect = document.getElementById('city');
    
    const stateLoading = document.getElementById('state-loading');
    const cityLoading = document.getElementById('city-loading');

    // 1. جلب جميع دول العالم عند تحميل الصفحة
    function loadCountries() {
        fetch(config.cUrl, { headers: { "X-CSCAPI-KEY": config.ckey } })
            .then(response => response.json())
            .then(data => {
                countrySelect.innerHTML = '<option value="">-- اختر الدولة --</option>';
                
                // ترتيب الدول أبجدياً
                data.sort((a, b) => a.name.localeCompare(b.name));

                data.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country.iso2; // نستخدم رمز الدولة مثل EG, US
                    option.textContent = country.name;
                    countrySelect.appendChild(option);
                });
            })
            .catch(error => {
                console.error('خطأ في جلب الدول:', error);
                countrySelect.innerHTML = '<option value="">فشل تحميل الدول</option>';
            });
    }

    // 2. عند تغيير الدولة -> جلب الولايات/المحافظات التابعة لها
    countrySelect.addEventListener('change', function() {
        const countryCode = this.value;
        
        // تصفية وتجهيز القوائم التالية
        stateSelect.innerHTML = '<option value="">-- اختر الولاية/المحافظة --</option>';
        citySelect.innerHTML = '<option value="">-- اختر المحافظة أولاً --</option>';
        stateSelect.disabled = true;
        citySelect.disabled = true;

        if (!countryCode) return;

        stateLoading.style.display = 'block';

        fetch(`${config.cUrl}/${countryCode}/states`, { headers: { "X-CSCAPI-KEY": config.ckey } })
            .then(response => response.json())
            .then(data => {
                stateLoading.style.display = 'none';
                
                if(data.length === 0) {
                    // بعض الدول الصغيرة جداً ليس لها محافظات، ننتقل للمدن مباشرة
                    stateSelect.innerHTML = '<option value="NONE">لا توجد محافظات (اختر المدينة مباشرة)</option>';
                    stateSelect.disabled = false;
                    loadCities(countryCode, 'NONE'); 
                    return;
                }

                data.sort((a, b) => a.name.localeCompare(b.name));
                data.forEach(state => {
                    const option = document.createElement('option');
                    option.value = state.iso2;
                    option.textContent = state.name;
                    stateSelect.appendChild(option);
                });
                stateSelect.disabled = false;
            });
    });

    // 3. عند تغيير الولاية -> جلب المدن التابعة لها
    stateSelect.addEventListener('change', function() {
        const countryCode = countrySelect.value;
        const stateCode = this.value;

        citySelect.innerHTML = '<option value="">-- اختر المدينة --</option>';
        citySelect.disabled = true;

        if (!stateCode || stateCode === 'NONE') return;

        cityLoading.style.display = 'block';
        loadCities(countryCode, stateCode);
    });

    // دالة مساعدة لجلب المدن
    function loadCities(countryCode, stateCode) {
        let url = `${config.cUrl}/${countryCode}/cities`; // إذا لم تكن هناك ولاية
        if(stateCode !== 'NONE') {
            url = `${config.cUrl}/${countryCode}/states/${stateCode}/cities`;
        }

        fetch(url, { headers: { "X-CSCAPI-KEY": config.ckey } })
            .then(response => response.json())
            .then(data => {
                cityLoading.style.display = 'none';
                citySelect.innerHTML = '<option value="">-- اختر المدينة --</option>';

                if(data.length === 0) {
                    citySelect.innerHTML = '<option value="">لا توجد مدن مسجلة</option>';
                    citySelect.disabled = false;
                    return;
                }

                data.sort((a, b) => a.name.localeCompare(b.name));
                data.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city.name;
                    option.textContent = city.name;
                    citySelect.appendChild(option);
                });
                citySelect.disabled = false;
            });
    }

    // تشغيل الدالة عند فتح الصفحة
    window.onload = loadCountries;
</script>

</body>
</html>
