<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدليل الكامل لدول ومدن العالم</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2333;
            --border: #30363d;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --text: #c9d1d9;
            --text-dim: #6e7681;
            --text-bright: #f0f6fc;
            --tag-bg: #1f2937;
            --tag-border: #374151;
            --radius: 10px;
            --loading: #f0883e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 30px 20px 60px;
        }
        .wrapper { max-width: 1080px; margin: 0 auto; }
        header {
            margin-bottom: 36px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }
        header h1 {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-bright);
            letter-spacing: -0.3px;
        }
        header p { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
        .search-wrap { position: relative; margin-bottom: 20px; }
        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
            font-size: 16px;
        }
        #searchBar {
            width: 100%;
            padding: 13px 44px 13px 18px;
            font-size: 15px;
            font-family: inherit;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-bright);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            direction: rtl;
        }
        #searchBar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88,166,255,0.12);
        }
        #searchBar:disabled { opacity: 0.5; cursor: not-allowed; }
        #status-message {
            font-size: 13px;
            font-family: 'Space Mono', monospace;
            color: var(--loading);
            background: rgba(240,136,62,0.07);
            border: 1px solid rgba(240,136,62,0.2);
            padding: 10px 16px;
            border-radius: 6px;
            margin-bottom: 24px;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #status-message::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--loading);
            flex-shrink: 0;
            animation: pulse 1.2s infinite;
        }
        #status-message.done {
            color: var(--accent2);
            background: rgba(63,185,80,0.07);
            border-color: rgba(63,185,80,0.2);
        }
        #status-message.done::before { background: var(--accent2); animation: none; }
        #status-message.error {
            color: #f85149;
            background: rgba(248,81,73,0.07);
            border-color: rgba(248,81,73,0.2);
        }
        #status-message.error::before { background: #f85149; animation: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #stats-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .stat-pill span { color: var(--accent); font-weight: 600; }
        #data-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .country-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 18px 14px;
            transition: border-color 0.2s, transform 0.2s;
            animation: fadeUp 0.35s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .country-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 8px;
        }
        .country-name { font-size: 15px; font-weight: 600; color: var(--text-bright); line-height: 1.3; }
        .country-code { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
        .city-count-badge {
            flex-shrink: 0;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            background: rgba(88,166,255,0.1);
            color: var(--accent);
            border: 1px solid rgba(88,166,255,0.2);
            padding: 3px 9px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .cities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-height: 130px;
            overflow-y: auto;
        }
        .cities-list::-webkit-scrollbar { width: 3px; }
        .cities-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .city-item {
            font-size: 11.5px;
            color: var(--text);
            background: var(--tag-bg);
            border: 1px solid var(--tag-border);
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .city-item:hover { background: var(--surface2); }
        .city-item.highlight {
            background: rgba(88,166,255,0.15);
            border-color: rgba(88,166,255,0.4);
            color: var(--accent);
        }
        .no-cities { font-size: 12px; color: var(--text-dim); font-style: italic; padding: 4px 0; }
        #no-results {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
            font-size: 15px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <h1>🌍 الدليل الشامل لدول ومدن العالم</h1>
        <p>بيانات مباشرة من GeoNames — المدن بالإنجليزية — البحث بالضغط على Enter</p>
    </header>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchBar" placeholder="جارٍ التحميل..." disabled>
    </div>

    <div id="status-message">جاري الاتصال بخادم GeoNames وجلب قائمة دول العالم...</div>

    <div id="stats-bar">
        <div class="stat-pill">الدول المحملة: <span id="stat-countries">0</span></div>
        <div class="stat-pill">إجمالي المدن: <span id="stat-cities">0</span></div>
        <div class="stat-pill">نتائج البحث: <span id="stat-results">—</span></div>
    </div>

    <div id="data-container">
        <div id="no-results">لم يتم العثور على نتائج مطابقة.</div>
    </div>
</div>

<script>
    const username = 'myeo';

    // ── State ──────────────────────────────────────────────────────────────
    let structuredWorldData = [];
    let allCards = [];        // [{ obj, cardEl }]
    let totalCities = 0;
    let activeSearch = '';

    // ── DOM refs ───────────────────────────────────────────────────────────
    const container     = document.getElementById('data-container');
    const statusEl      = document.getElementById('status-message');
    const searchBar     = document.getElementById('searchBar');
    const statCountries = document.getElementById('stat-countries');
    const statCitiesEl  = document.getElementById('stat-cities');
    const statResults   = document.getElementById('stat-results');
    const noResults     = document.getElementById('no-results');

    const delay = ms => new Promise(r => setTimeout(r, ms));

    // ── Helpers ────────────────────────────────────────────────────────────
    function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className   = type || '';
    }

    function updateStats() {
        statCountries.textContent = structuredWorldData.length;
        statCitiesEl.textContent  = totalCities.toLocaleString();
    }

    // ── Build card element ONCE per country ────────────────────────────────
    function createCard(item) {
        const card = document.createElement('div');
        card.className = 'country-card';

        const header = document.createElement('div');
        header.className = 'card-header';

        const nameWrap = document.createElement('div');
        nameWrap.innerHTML =
            '<div class="country-name">' + item.name + '</div>' +
            '<div class="country-code">' + item.code + '</div>';

        const badge = document.createElement('span');
        badge.className = 'city-count-badge';
        badge.textContent = item.cities.length + ' cities';

        header.appendChild(nameWrap);
        header.appendChild(badge);
        card.appendChild(header);

        const citiesDiv = document.createElement('div');
        citiesDiv.className = 'cities-list';

        if (item.cities.length > 0) {
            item.cities.forEach(function(city) {
                const span = document.createElement('span');
                span.className = 'city-item';
                span.textContent = city;
                citiesDiv.appendChild(span);
            });
        } else {
            var em = document.createElement('em');
            em.className = 'no-cities';
            em.textContent = 'No cities available';
            citiesDiv.appendChild(em);
        }

        card.appendChild(citiesDiv);
        return card;
    }

    // ── Search: hide/show + highlight (NO re-render) ───────────────────────
    function applySearch(term) {
        activeSearch = term.toLowerCase().trim();
        var visible = 0;

        for (var i = 0; i < allCards.length; i++) {
            var entry   = allCards[i];
            var obj     = entry.obj;
            var cardEl  = entry.cardEl;
            var cityItems = cardEl.querySelectorAll('.city-item');

            if (!activeSearch) {
                cardEl.style.display = '';
                for (var j = 0; j < cityItems.length; j++) {
                    cityItems[j].classList.remove('highlight');
                }
                visible++;
                continue;
            }

            var matchCountry   = obj.name.toLowerCase().indexOf(activeSearch) !== -1;
            var matchedCities  = 0;

            for (var k = 0; k < cityItems.length; k++) {
                var m = cityItems[k].textContent.toLowerCase().indexOf(activeSearch) !== -1;
                if (m) {
                    cityItems[k].classList.add('highlight');
                    matchedCities++;
                } else {
                    cityItems[k].classList.remove('highlight');
                }
            }

            if (matchCountry || matchedCities > 0) {
                cardEl.style.display = '';
                visible++;
            } else {
                cardEl.style.display = 'none';
            }
        }

        noResults.style.display = (visible === 0) ? 'block' : 'none';
        statResults.textContent = activeSearch ? visible : '—';
    }

    // ── Append a batch: create cards, apply current filter, insert DOM ──────
    function appendBatch(batch) {
        var frag = document.createDocumentFragment();

        for (var i = 0; i < batch.length; i++) {
            var item   = batch[i];
            var cardEl = createCard(item);

            // تطبيق فلتر البحث الحالي على البطاقات الجديدة فوراً
            if (activeSearch) {
                var matchCountry  = item.name.toLowerCase().indexOf(activeSearch) !== -1;
                var cityItems     = cardEl.querySelectorAll('.city-item');
                var matchedCities = 0;

                for (var k = 0; k < cityItems.length; k++) {
                    var m = cityItems[k].textContent.toLowerCase().indexOf(activeSearch) !== -1;
                    if (m) { cityItems[k].classList.add('highlight'); matchedCities++; }
                    else   { cityItems[k].classList.remove('highlight'); }
                }

                if (!matchCountry && matchedCities === 0) {
                    cardEl.style.display = 'none';
                }
            }

            allCards.push({ obj: item, cardEl: cardEl });
            frag.appendChild(cardEl);
        }

        // إدراج قبل عنصر "لا نتائج" حتى يبقى في آخر الـ grid
        container.insertBefore(frag, noResults);
    }

    // ── Main loader: 30 دولة × دفعة ───────────────────────────────────────
    async function loadGeoNamesDatabase() {
        try {
            var res  = await fetch('https://secure.geonames.org/countryInfoJSON?username=' + username);
            var data = await res.json();

            if (!data.geonames) throw new Error('فشل جلب الدول');

            var countries = data.geonames.sort(function(a, b) {
                return a.countryName.localeCompare(b.countryName);
            });

            searchBar.disabled    = false;
            searchBar.placeholder = 'ابحث عن دولة أو مدينة ثم اضغط Enter...';

            var BATCH        = 30;
            var pendingBatch = [];

            for (var i = 0; i < countries.length; i++) {
                var country = countries[i];
                setStatus('(' + (i + 1) + '/' + countries.length + ') جاري جلب مدن: ' + country.countryName);

                var cities = [];
                try {
                    // lang=en يضمن جلب أسماء المدن بالإنجليزية فقط
                    var url = 'https://secure.geonames.org/searchJSON?country=' + country.countryCode +
                              '&featureClass=P&maxRows=1000&lang=en&username=' + username;
                    var cr = await fetch(url);
                    var cd = await cr.json();
                    if (cd.geonames) {
                        var seen = {};
                        cd.geonames.forEach(function(c) {
                            if (!seen[c.name]) { seen[c.name] = true; cities.push(c.name); }
                        });
                        cities.sort();
                    }
                } catch (e) {
                    console.warn('فشل جلب مدن ' + country.countryName, e);
                }

                totalCities += cities.length;
                var obj = { name: country.countryName, code: country.countryCode, cities: cities };
                structuredWorldData.push(obj);
                pendingBatch.push(obj);
                updateStats();

                // دفعة كل 30 دولة أو عند نهاية القائمة
                if (pendingBatch.length === BATCH || i === countries.length - 1) {
                    appendBatch(pendingBatch);
                    pendingBatch = [];
                    await delay(1);
                }
            }

            setStatus('🎉 اكتمل تحميل كافة دول ومدن العالم بنجاح!', 'done');

        } catch (err) {
            console.error(err);
            setStatus('⚠️ حدث خطأ. تأكد من تفعيل حساب GeoNames (' + username + ') لخدمات الويب المجانية.', 'error');
        }
    }

    // ── Events ─────────────────────────────────────────────────────────────
    // بحث عند الضغط على Enter
    searchBar.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') applySearch(searchBar.value);
    });

    // عند مسح خانة البحث بالكامل → إظهار كل البطاقات فوراً بدون إعادة تحميل
    searchBar.addEventListener('input', function(e) {
        if (e.target.value.trim() === '') applySearch('');
    });

    window.onload = loadGeoNamesDatabase;
</script>
</body>
</html>
