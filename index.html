<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدليل الكامل لدول ومدن العالم عبر GeoNames</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        /* شريط البحث */
        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 30px;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .search-box:focus {
            border-color: #3498db;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15);
        }

        /* مؤشر التحميل */
        #status-message {
            text-align: center;
            font-size: 16px;
            color: #2980b9;
            background: #eaf2f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* حاوية البيانات */
        #data-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* رسالة لا توجد نتائج */
        #no-results-msg {
            display: none;
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 15px;
        }

        /* بطاقة الدولة */
        .country-card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.4s ease-in-out;
        }
        /* إخفاء بطاقة دولة عند الفلترة */
        .country-card.hidden {
            display: none;
        }
        /* إخفاء مدينة بعينها عند الفلترة */
        .city-item.city-hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .country-name {
            font-size: 22px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .city-count {
            font-size: 13px;
            background: #3498db;
            color: #fff;
            padding: 3px 10px;
            border-radius: 15px;
        }

        /* حاوية المدن */
        .cities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .city-item {
            background-color: #f8fafc;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .cities-list::-webkit-scrollbar {
            width: 4px;
        }
        .cities-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>الدليل الشامل لدول ومدن العالم (GeoNames)</h2>
    <p class="subtitle">بيانات حية ومباشرة مدعومة بحسابك الشخصي عبر سيرفر GeoNames</p>

    <input type="text" id="searchBar" class="search-box"
           placeholder="البحث معطل مؤقتاً حتى يكتمل تحميل البيانات..." disabled>

    <div id="status-message">جاري الاتصال بخادم GeoNames وجلب قائمة دول العالم...</div>

    <div id="no-results-msg">لم يتم العثور على نتائج مطابقة.</div>
    <div id="data-container"></div>
</div>

<script>
    // ============================================================
    // الإعدادات الأساسية
    // ============================================================
    const USERNAME   = 'myeo';       // اسم مستخدم GeoNames
    const BATCH_SIZE = 30;           // عدد الدول في كل دفعة تحميل
    const CHUNK_DELAY_MS = 1;        // تأخير بين الدفعات (مللي ثانية)

    // ============================================================
    // المتغيرات العامة
    // ============================================================
    let structuredWorldData = [];    // مصفوفة تحمل بيانات الدول + المدن
    let dataFullyLoaded    = false;  // هل اكتمل التحميل الكلي؟

    const dataContainer  = document.getElementById('data-container');
    const statusMessage  = document.getElementById('status-message');
    const noResultsMsg   = document.getElementById('no-results-msg');
    const searchBar      = document.getElementById('searchBar');

    // أداة تأخير مساعدة
    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

    // ============================================================
    // 1. جلب مدن دولة واحدة بالإنجليزية فقط
    //    يُضاف &lang=en لإجبار GeoNames على إرجاع الأسماء الإنجليزية
    // ============================================================
    async function fetchCitiesForCountry(countryCode) {
        try {
            const url = `https://secure.geonames.org/searchJSON`
                      + `?country=${countryCode}`
                      + `&featureClass=P`
                      + `&maxRows=1000`
                      + `&lang=en`               // ← الاسم الإنجليزي فقط
                      + `&username=${USERNAME}`;
            const res  = await fetch(url);
            const data = await res.json();

            if (!data.geonames) return [];

            // إزالة التكرار وإرجاع قائمة مرتبة أبجدياً
            const unique = [...new Set(data.geonames.map(c => c.name))];
            unique.sort((a, b) => a.localeCompare(b));
            return unique;
        } catch {
            return [];
        }
    }

    // ============================================================
    // 2. بناء بطاقة DOM لدولة وإلحاقها بالحاوية
    // ============================================================
    function buildAndAppendCard(item) {
        const card = document.createElement('div');
        card.className = 'country-card';
        card.dataset.countryName = item.name.toLowerCase();

        // ترويسة البطاقة
        const header = document.createElement('h3');
        header.className = 'country-name';
        header.innerHTML = `
            <span>${item.name} <small style="color:#7f8c8d;font-size:14px;">(${item.code})</small></span>
            <span class="city-count">${item.cities.length} مدينة/بلدة</span>
        `;
        card.appendChild(header);

        // قائمة المدن
        const citiesDiv = document.createElement('div');
        citiesDiv.className = 'cities-list';

        if (item.cities.length > 0) {
            item.cities.forEach(city => {
                const span = document.createElement('span');
                span.className = 'city-item';
                span.dataset.cityName = city.toLowerCase();
                span.textContent = city;
                citiesDiv.appendChild(span);
            });
        } else {
            citiesDiv.innerHTML = '<em style="color:#aaa;font-size:13px;padding:5px;">No cities available</em>';
        }

        card.appendChild(citiesDiv);
        dataContainer.appendChild(card);

        // ربط العنصر DOM بكائن البيانات للوصول السريع لاحقاً
        item._card = card;
    }

    // ============================================================
    // 3. التحميل الرئيسي: دفعات من 30 دولة متوازية
    // ============================================================
    async function loadGeoNamesDatabase() {
        try {
            // أ) جلب قائمة الدول
            const countriesUrl = `https://secure.geonames.org/countryInfoJSON?username=${USERNAME}`;
            const res  = await fetch(countriesUrl);
            const data = await res.json();

            if (!data.geonames) {
                throw new Error('فشل جلب الدول. تأكد من تفعيل خدمات الويب المجانية في حساب GeoNames الخاص بك.');
            }

            // ب) ترتيب الدول أبجدياً
            const countries = data.geonames.sort((a, b) =>
                a.countryName.localeCompare(b.countryName)
            );

            // ج) تفعيل البحث فور بدء التحميل
            searchBar.disabled = false;
            searchBar.placeholder = 'ابحث عن دولة أو مدينة...';

            const total = countries.length;
            let loaded  = 0;

            // د) معالجة الدول على دفعات من BATCH_SIZE دولة
            for (let i = 0; i < total; i += BATCH_SIZE) {
                const batch = countries.slice(i, i + BATCH_SIZE);

                // ←← تحميل مدن الـ 30 دولة بشكل متوازٍ (Promise.all)
                const batchResults = await Promise.all(
                    batch.map(async country => {
                        const cities = await fetchCitiesForCountry(country.countryCode);
                        return {
                            name  : country.countryName,
                            code  : country.countryCode,
                            cities: cities,
                            _card : null   // سيُعبأ لاحقاً عند بناء DOM
                        };
                    })
                );

                // هـ) إضافة نتائج الدفعة إلى المصفوفة الكلية وعرضها
                batchResults.forEach(item => {
                    structuredWorldData.push(item);
                    buildAndAppendCard(item);
                });

                loaded += batch.length;
                statusMessage.textContent =
                    `جاري التحميل... (${loaded} من أصل ${total} دولة)`;

                // فاصل زمني قصير بين الدفعات لمنع تجميد المتصفح
                await delay(CHUNK_DELAY_MS);
            }

            // و) إعلان الاكتمال
            dataFullyLoaded = true;
            statusMessage.style.background = '#d4edda';
            statusMessage.style.color      = '#155724';
            statusMessage.textContent = `🎉 اكتمل تحميل جميع دول ومدن العالم (${total} دولة) بنجاح!`;
            searchBar.placeholder = 'ابحث عن دولة أو مدينة... (اتركه فارغاً لعرض الكل)';

        } catch (err) {
            console.error('خطأ أثناء التحميل:', err);
            statusMessage.textContent =
                'حدث خطأ. تأكد من أن حساب GeoNames مفعّل لخدمات الويب الحرة.';
            statusMessage.style.background = '#f2dede';
            statusMessage.style.color      = '#a94442';
        }
    }

    // ============================================================
    // 4. منطق البحث — إخفاء/إظهار فقط، بدون إعادة بناء DOM
    // ============================================================
    function applyFilter(term) {
        // إذا كانت خانة البحث فارغة → أظهر كل شيء
        if (!term) {
            structuredWorldData.forEach(item => {
                if (!item._card) return;
                // إظهار البطاقة كاملةً مع جميع مدنها
                item._card.classList.remove('hidden');
                item._card.querySelectorAll('.city-item').forEach(span => {
                    span.classList.remove('city-hidden');
                });
            });
            noResultsMsg.style.display = 'none';
            return;
        }

        let visibleCount = 0;

        structuredWorldData.forEach(item => {
            if (!item._card) return; // البطاقة لم تُبن بعد (أثناء التحميل)

            const countryMatch = item.name.toLowerCase().includes(term);

            if (countryMatch) {
                // الدولة نفسها تطابق → أظهر البطاقة بكل مدنها
                item._card.classList.remove('hidden');
                item._card.querySelectorAll('.city-item').forEach(span => {
                    span.classList.remove('city-hidden');
                });
                visibleCount++;
            } else {
                // تحقق من المدن
                let matchingCities = 0;
                item._card.querySelectorAll('.city-item').forEach(span => {
                    if (span.dataset.cityName.includes(term)) {
                        span.classList.remove('city-hidden');
                        matchingCities++;
                    } else {
                        span.classList.add('city-hidden');
                    }
                });

                if (matchingCities > 0) {
                    item._card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    item._card.classList.add('hidden');
                }
            }
        });

        noResultsMsg.style.display = visibleCount === 0 ? 'block' : 'none';
    }

    // ============================================================
    // 5. مستمعات أحداث شريط البحث
    //    - البحث يبدأ عند الضغط Enter
    //    - عند تفريغ الحقل (Backspace / Clear) يُعاد الإظهار فوراً
    // ============================================================
    let lastAppliedTerm = '';

    searchBar.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            const term = searchBar.value.toLowerCase().trim();
            if (term === lastAppliedTerm) return; // لم يتغير شيء
            lastAppliedTerm = term;
            applyFilter(term);
        }
    });

    searchBar.addEventListener('input', function () {
        if (searchBar.value.trim() === '') {
            lastAppliedTerm = '';
            applyFilter('');   // إعادة إظهار كل شيء فوراً بدون إعادة بناء
        }
    });

    // ============================================================
    // بدء التطبيق
    // ============================================================
    window.onload = loadGeoNamesDatabase;
</script>

</body>
</html>
